<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrivateFinanceExpert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #F0F3F8;
      --bg-grid: rgba(99, 130, 255, 0.03);
      --surface: rgba(255, 255, 255, 0.72);
      --surface-solid: #FFFFFF;
      --surface-hover: rgba(255, 255, 255, 0.9);
      --raised: #FFFFFF;
      --border: rgba(99, 130, 255, 0.1);
      --border-strong: rgba(99, 130, 255, 0.2);
      --primary: #4F6BFF;
      --primary-light: #818CF8;
      --primary-dim: rgba(79, 107, 255, 0.08);
      --primary-glow: rgba(79, 107, 255, 0.15);
      --gradient-start: #4F6BFF;
      --gradient-end: #06B6D4;
      --text: #1A1F36;
      --text-secondary: #4A5578;
      --muted: #8892A8;
      --up: #10B981;
      --up-dim: rgba(16, 185, 129, 0.08);
      --up-border: rgba(16, 185, 129, 0.2);
      --down: #EF4444;
      --down-dim: rgba(239, 68, 68, 0.08);
      --down-border: rgba(239, 68, 68, 0.2);
      --warning: #F59E0B;
      --warning-dim: rgba(245, 158, 11, 0.08);
      --font-display: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --shadow-sm: 0 1px 3px rgba(79, 107, 255, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 4px 16px rgba(79, 107, 255, 0.06), 0 2px 4px rgba(0, 0, 0, 0.02);
      --shadow-lg: 0 12px 40px rgba(79, 107, 255, 0.1), 0 4px 12px rgba(0, 0, 0, 0.03);
      --shadow-glow: 0 0 20px rgba(79, 107, 255, 0.12);
      --transition-fast: 180ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-layout: 350ms cubic-bezier(0.22, 1, 0.36, 1);
      --blur: blur(12px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-display);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.55;
      overflow: hidden;
      height: 100vh;
      /* Subtle dot grid for tech feel */
      background-image:
        radial-gradient(circle, rgba(79, 107, 255, 0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    #root {
      display: flex;
      height: 100vh;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }

    /* ═══ SIDEBAR ═══ */
    .sidebar {
      width: 232px;
      min-width: 232px;
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      box-shadow: 1px 0 12px rgba(79, 107, 255, 0.03);
    }

    .sidebar-brand {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .sidebar-brand h1 {
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      margin-bottom: 3px;
    }

    .sidebar-brand span {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .sidebar-nav {
      flex: 1;
      padding: 4px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 14px 12px 6px;
      font-weight: 600;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid transparent;
      position: relative;
    }

    .nav-item:hover {
      background: var(--primary-dim);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(79, 107, 255, 0.12);
      color: var(--primary);
      border-color: var(--primary-glow);
      font-weight: 600;
      box-shadow: var(--shadow-glow);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 18px;
      background: linear-gradient(180deg, var(--gradient-start), var(--gradient-end));
      border-radius: 0 3px 3px 0;
    }

    .nav-item svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
      flex-shrink: 0;
    }

    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* ═══ MAIN CONTENT ═══ */
    .main-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 28px 36px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .page-header-actions {
      display: flex;
      gap: 8px;
    }

    /* ═══ CARDS ═══ */
    .card {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sm);
    }

    .card:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-md);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    /* ═══ METRIC CARDS ═══ */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .metric-card:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .metric-card:hover::before {
      opacity: 1;
    }

    .metric-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .metric-value {
      font-family: var(--font-mono);
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .metric-value.primary {
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .metric-value.up { color: var(--up); }
    .metric-value.down { color: var(--down); }

    .metric-delta {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
    }

    .metric-delta.up {
      color: var(--up);
      background: var(--up-dim);
      border: 1px solid var(--up-border);
    }

    .metric-delta.down {
      color: var(--down);
      background: var(--down-dim);
      border: 1px solid var(--down-border);
    }

    /* ═══ GRID LAYOUT ═══ */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    /* ═══ TABLE ═══ */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .data-table td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all var(--transition-fast);
    }

    .data-table tr:hover td {
      color: var(--text);
      background: var(--primary-dim);
    }

    .data-table .mono {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
    }

    .data-table .up { color: var(--up); }
    .data-table .down { color: var(--down); }

    /* ═══ TAGS ═══ */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .tag-must-read { background: var(--down-dim); color: var(--down); border: 1px solid var(--down-border); }
    .tag-readable { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(79, 107, 255, 0.2); }
    .tag-ignore { background: rgba(136, 146, 168, 0.08); color: var(--muted); border: 1px solid rgba(136, 146, 168, 0.15); }
    .tag-up { background: var(--up-dim); color: var(--up); border: 1px solid var(--up-border); }
    .tag-down { background: var(--down-dim); color: var(--down); border: 1px solid var(--down-border); }

    /* ═══ BUTTONS ═══ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid var(--border-strong);
      background: var(--surface-solid);
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
    }

    .btn:hover {
      border-color: var(--primary-light);
      color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      border: none;
      color: #FFFFFF;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(79, 107, 255, 0.25);
    }

    .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(79, 107, 255, 0.35);
      transform: translateY(-1px);
      color: #FFFFFF;
    }

    /* ═══ CHART ═══ */
    .chart-container {
      position: relative;
      width: 100%;
      height: 200px;
    }

    .chart-container canvas {
      max-width: 100%;
      max-height: 100%;
    }

    /* ═══ FORMS ═══ */
    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface-solid);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-display);
      transition: all var(--transition-fast);
      outline: none;
      box-shadow: var(--shadow-sm);
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow), var(--shadow-sm);
    }

    .form-input::placeholder { color: var(--muted); }
    select.form-input { appearance: none; cursor: pointer; }
    textarea.form-input { resize: vertical; min-height: 80px; }

    /* ═══ SLIDER ═══ */
    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
      border-radius: 3px;
      outline: none;
      opacity: 0.7;
      transition: opacity var(--transition-fast);
    }

    .slider:hover { opacity: 1; }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--surface-solid);
      cursor: pointer;
      border: 3px solid var(--primary);
      box-shadow: 0 2px 6px rgba(79, 107, 255, 0.3);
    }

    .slider-value {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      min-width: 36px;
      text-align: right;
    }

    /* ═══ NEWS ═══ */
    .news-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 12px;
      border-bottom: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: all var(--transition-fast);
      margin: 0 -12px;
    }

    .news-item:hover {
      background: var(--primary-dim);
      border-color: transparent;
    }

    .news-item:last-child { border-bottom: none; }

    .news-time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      min-width: 44px;
      font-weight: 500;
    }

    .news-content { flex: 1; }

    .news-title {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 3px;
      font-weight: 500;
    }

    .news-summary {
      font-size: 12px;
      color: var(--muted);
    }

    /* ═══ ATTRIBUTION ═══ */
    .attribution-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 3px;
      background: var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      height: 210px;
    }

    .attribution-cell {
      background: var(--surface-solid);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: all var(--transition-fast);
    }

    .attribution-cell:hover {
      background: var(--primary-dim);
    }

    .attribution-cell .cell-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .attribution-cell .cell-value {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 700;
    }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 1200px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { padding: 16px; }
      .metrics-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE = 'http://localhost:8001';

    async function apiFetch(path) {
      try {
        const resp = await fetch(API_BASE + path);
        if (!resp.ok) throw new Error(resp.statusText);
        const json = await resp.json();
        return json.data ?? json;
      } catch (e) {
        console.warn('[API]', path, e.message);
        return null;
      }
    }

    const Icons = {
      dashboard: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
      research: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M8 11h6M11 8v6"/></svg>,
      news: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16v16H4z" rx="2"/><path d="M4 8h16"/><path d="M8 4v4"/><rect x="10" y="11" width="8" height="2.5" rx="0.5"/><rect x="10" y="15" width="5" height="2" rx="0.5"/></svg>,
      record: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
      review: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.42-8.37L1 10"/></svg>,
      portfolio: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/></svg>,
      calibration: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
    };

    const navItems = [
      { id: 'dashboard', label: '仪表盘', icon: 'dashboard', section: '概览' },
      { id: 'research', label: '个股分析', icon: 'research', section: '分析' },
      { id: 'news', label: '信息总览', icon: 'news', section: '分析' },
      { id: 'record', label: '记判断', icon: 'record', section: '操作' },
      { id: 'review', label: '复盘中心', icon: 'review', section: '操作' },
      { id: 'portfolio', label: '持仓看板', icon: 'portfolio', section: '操作' },
      { id: 'calibration', label: '校准报告', icon: 'calibration', section: '提升' },
    ];

    function Sidebar({ activePage, onNavigate }) {
      const sections = {};
      navItems.forEach(item => {
        if (!sections[item.section]) sections[item.section] = [];
        sections[item.section].push(item);
      });

      return (
        <aside className="sidebar">
          <div className="sidebar-brand">
            <h1>PrivateFinanceExpert</h1>
            <span>AI 投资分析系统</span>
          </div>
          <nav className="sidebar-nav">
            {Object.entries(sections).map(([section, items]) => (
              <React.Fragment key={section}>
                <div className="nav-section-label">{section}</div>
                {items.map(item => (
                  <div
                    key={item.id}
                    className={`nav-item ${activePage === item.id ? 'active' : ''}`}
                    onClick={() => onNavigate(item.id)}
                  >
                    {Icons[item.icon]}
                    <span>{item.label}</span>
                  </div>
                ))}
              </React.Fragment>
            ))}
          </nav>
          <div className="sidebar-footer">v0.2.0 · 2026-06-24</div>
        </aside>
      );
    }

    // ═══ MOCK DATA (fallback when API unavailable) ═══
    const MOCK_INDICES = [
      {name:'上证指数',code:'000001',price:3284.56,change_pct:0.85,market:'A股'},
      {name:'深证成指',code:'399001',price:10892.31,change_pct:1.12,market:'A股'},
      {name:'创业板指',code:'399006',price:2187.45,change_pct:-0.23,market:'A股'},
      {name:'科创50',code:'000688',price:1123.78,change_pct:1.56,market:'A股'},
      {name:'纳斯达克',code:'IXIC',price:19876.54,change_pct:0.62,market:'海外'},
      {name:'恒生指数',code:'HSI',price:21543.21,change_pct:-0.41,market:'海外'},
      {name:'日经225',code:'N225',price:38456.78,change_pct:0.35,market:'海外'},

    function KlineChart({ data }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      const labels = (data || []).map(d => d.date?.slice(5) || '');
      const closes = (data || []).map(d => d.close);

      // 自定义 candlestick 渲染插件
      const candlePlugin = {
        id: 'candlestick',
        afterDraw(chart) {
          const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
          if (!data || !data.length) return;
          const barWidth = Math.max(2, Math.min(8, (right - left) / data.length * 0.6));
          data.forEach((d, i) => {
            const xPos = x.getPixelForValue(labels[i]);
            if (xPos < left || xPos > right) return;
            const openY = y.getPixelForValue(d.open);
            const closeY = y.getPixelForValue(d.close);
            const highY = y.getPixelForValue(d.high);
            const lowY = y.getPixelForValue(d.low);
            const isUp = d.close >= d.open;

            // 影线 (high-low)
            ctx.strokeStyle = isUp ? '#10B981' : '#EF4444';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(xPos, highY);
            ctx.lineTo(xPos, lowY);
            ctx.stroke();

            // 实体 (open-close)
            const bodyH = Math.max(1, Math.abs(closeY - openY));
            ctx.fillStyle = isUp ? '#10B981' : '#EF4444';
            ctx.fillRect(xPos - barWidth / 2, Math.min(openY, closeY), barWidth, bodyH);
          });
        },
      };

      useEffect(() => {
        if (!canvasRef.current || !data || !data.length) return;
        if (chartRef.current) chartRef.current.destroy();
        const ctx = canvasRef.current.getContext('2d');
        const yMin = Math.min(...data.map(d => d.low)) * 0.995;
        const yMax = Math.max(...data.map(d => d.high)) * 1.005;
        chartRef.current = new Chart(ctx, {
          type: 'line',
          data: { labels, datasets: [{ data: closes, borderColor: 'transparent', pointRadius: 0 }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  title: ctx => data[ctx[0].dataIndex]?.date || '',
                  label: ctx => {
                    const d = data[ctx.dataIndex];
                    return d ? [`开: ${d.open}  高: ${d.high}`, `低: ${d.low}  收: ${d.close}`, `量: ${d.volume?.toLocaleString()}`] : [];
                  },
                },
              },
            },
            scales: {
              x: { grid: { color: 'rgba(99,130,255,0.04)' }, ticks: { color: '#8892A8', font: { size: 10 }, maxTicksLimit: 8 } },
              y: { min: yMin, max: yMax, grid: { color: 'rgba(99,130,255,0.04)' }, ticks: { color: '#8892A8', font: { size: 11, family: 'JetBrains Mono' } } },
            },
          },
          plugins: [candlePlugin],
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data]);
      return <canvas ref={canvasRef} />;
    }

            <span style={{fontSize:12,color:'var(--muted)',fontFamily:'var(--font-mono)'}}>2026年6月</span>
          </div>
          <div className="metrics-grid" style={{gridTemplateColumns:'repeat(3, 1fr)'}}>
            <div className="metric-card">
              <div className="metric-label">月度 Brier Score</div>
              <div className="metric-value primary">{summary.avg_brier ?? '—'}</div>
              <div className="metric-delta up">较上月 -0.01</div>
            </div>
            <div className="metric-card">
              <div className="metric-label">过度自信检测</div>
              <div className="metric-value" style={{fontSize:17,color:'var(--warning)'}}>轻微过度自信</div>
              <div className="metric-delta" style={{color:'var(--warning)',background:'var(--warning-dim)',border:'1px solid rgba(245,158,11,0.2)'}}>80%+区间偏高</div>
            </div>
            <div className="metric-card">
              <div className="metric-label">总判断数 / 准确率</div>
              <div className="metric-value">{summary.count} <span style={{fontSize:14,color:'var(--muted)'}}>/</span> <span style={{color:'var(--up)'}}>{summary.accuracy}%</span></div>
            </div>
          </div>
          <div className="grid-2">
            <div className="card">
              <div className="card-header"><span className="card-title">按标的偏差分析</span></div>
              <table className="data-table">
                <thead><tr><th>标的</th><th>判断数</th><th>准确率</th><th>偏差</th></tr></thead>
                <tbody>
                  {biasByTarget.map((item, i) => (
                    <tr key={i}>
                      <td style={{color:'var(--text)',fontWeight:600}}>{item.target}</td>
                      <td className="mono">{item.count}</td>
                      <td className={`mono ${item.accuracy>=70?'up':item.accuracy<50?'down':''}`}>{item.accuracy}%</td>
                      <td className="mono" style={{color:biasColor(item.bias)}}>{item.bias}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="card">
              <div className="card-header"><span className="card-title">改进建议</span></div>
              <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.8}}>
                <div style={{padding:'12px 14px',background:'var(--down-dim)',borderRadius:'var(--radius-md)',marginBottom:10,borderLeft:'3px solid var(--down)'}}>
                  <strong style={{color:'var(--text)'}}>中芯国际</strong>：5次判断仅2次正确（40%），但平均置信度72%。建议降低该标的置信度或增加分析深度。
                </div>
                <div style={{padding:'12px 14px',background:'var(--warning-dim)',borderRadius:'var(--radius-md)',marginBottom:10,borderLeft:'3px solid var(--warning)'}}>
                  <strong style={{color:'var(--text)'}}>时间窗口</strong>：1周窗口判断准确率（58%）显著低于1月窗口（79%）。考虑减少短期判断或调低其置信度。
                </div>
                <div style={{padding:'12px 14px',background:'var(--up-dim)',borderRadius:'var(--radius-md)',borderLeft:'3px solid var(--up)'}}>
                  <strong style={{color:'var(--text)'}}>茅台+比亚迪</strong>：准确率高且校准良好，这两个标的是你的优势圈。
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══ APP ═══
    function App() {
      const [activePage, setActivePage] = useState('dashboard');
      const renderPage = () => {
        switch(activePage) {
          case 'dashboard': return <DashboardPage onNavigate={setActivePage} />;
          case 'research': return <ResearchPage />;
          case 'news': return <NewsPage />;
          case 'record': return <RecordPage />;
          case 'review': return <ReviewPage />;
          case 'portfolio': return <PortfolioPage />;
          case 'calibration': return <CalibrationPage />;
          default: return <DashboardPage onNavigate={setActivePage} />;
        }
      };
      return (
        <>
          <Sidebar activePage={activePage} onNavigate={setActivePage} />
          <main className="main-content">{renderPage()}</main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
